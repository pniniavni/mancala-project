<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנקלה - דף כניסה</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="home-page">
    <header>
        <h1 class="main-title">משחק המנקלה</h1>
        <p class="subtitle">אסטרטגיה עתיקה באריזה מודרנית</p>
    </header>
    
    <main>
        <section id="section" class="login-container">
            <h2>כניסה לשחקנים</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="username">שם השחקן:</label>
                    <input type="text" id="username" placeholder="הקלידו שם כאן..." required>
                </div>
                
                <div class="input-group">
                    <label for="level">רמת קושי:</label>
                    <select id="level">
                        <option value="easy">מתחילים (4 אבנים)</option>
                        <option value="hard">מקצוענים (6 אבנים)</option>
                    </select>
                </div>
                
                <button type="submit" class="start-btn">התחל משחק</button>
            </form>
            
            <div class="extra-links">
                <a href="pages/instructions.html" class="instr-link">איך משחקים? (הוראות)</a>
            </div>
        </section>
    </main>

    <footer>
        <p>מנקלה - פרויקט פיתוח 2026</p>
    </footer>
    
    <script src="scripts/main.js"></script>
</body>
</html>
