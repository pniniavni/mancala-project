<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנקלה - כניסה</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="home-page">
    <h1 class="main-title">משחק המנקלה</h1>
    <main class="login-container">
        <form id="login-form">
            <input type="text" id="username" placeholder="שם שחקן" required minlength="2">
            <select id="level">
                <option value="human">שני שחקנים (קל)</option>
                <option value="ai">נגד המחשב (קשה)</option>
            </select>
            <button type="submit" class="start-btn">התחל משחק</button>
        </form>
        <div class="extra-links">
            <a href="pages/instructions.html">הוראות משחק</a> | 
            <a href="pages/scores.html">טבלת שיאים</a>
        </div>
    </main>
    <script src="scripts/main.js"></script>
</body>
</html>
