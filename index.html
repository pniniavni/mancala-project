<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנקלה - דף הבית</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="home-page">
    <h1 class="main-title">משחק המנקלה</h1>
    <section id="section" class="login-container">
        <h2>כניסה למשחק</h2>
        <form id="login-form">
            <input type="text" id="username" placeholder="שם השחקן" required>
            <select id="level">
                <option value="easy">מתחילים (4 אבנים)</option>
                <option value="hard">מומחים (6 אבנים)</option>
            </select>
            <button type="submit" class="start-btn">התחל משחק</button>
        </form>
        <div style="margin-top: 25px;">
            <a href="pages/instructions.html" style="color: #8b4513; font-weight: bold;">איך משחקים?</a>
        </div>
    </section>
    <script src="scripts/main.js"></script>
</body>
</html>
