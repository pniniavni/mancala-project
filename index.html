<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>מנקלה - דף כניסה</title>
 <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header>
        <h1>ברוכים הבאים למשחק מנקלה!</h1>
    </header>
    <main>
        <section id="section">
        <h2>הרשמה למשחק</h2>
     <form id="login-form">
        <input type="text" id="username" placeholder="הכנס שם משתמש" required>
        <label for="level">בחר רמת קושי:</label>
        <select id="level">
        <option value="easy">קל (4 אבנים בכל גומחה)</option>
        <option value="hard">קשה (6 אבנים בכל גומחה)</option>
        </select>
  <button type="submit">התחל משחק</button>
      </form>
      </section>
    </main>
    <a href="pages/instructions.html">לקריאת הוראות המשחק</a>
    <footer>
        <p>כל הזכויות שמורות לפרויקט מנקלה</p>
    </footer>
    <script src="scripts/main.js" type="module"></script>
 
</body>
</html>
