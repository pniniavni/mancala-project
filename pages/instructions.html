<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנקלה - הוראות</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <header><h1>איך משחקים?</h1></header>
    <main class="instructions-container">
        <section class="instruction-step">
            <img src="../images/MANCALA01.png" class="instruction-img">
            <div class="step-content">
                <div class="step-number">1</div>
                <p>מניחים 4 אבנים בכל גומה בתחילת המשחק. לכל שחקן יש קופה גדולה בצד שלו.</p>
            </div>
        </section>

        <section class="instruction-step">
            <img src="../images/MANCALA02.png" class="instruction-img">
            <div class="step-content">
                <div class="step-number">2</div>
                <div class="step-text">
                    <p>בוחרים גומה מהצד שלכם ומפזרים את האבנים אחת-אחת נגד כיוון השעון.</p>
                </div>
            </div>
        </section>

        <section class="instruction-step">
            <img src="../images/MANCALA03.png" class="instruction-img">
            <div class="step-content">
                <div class="step-number">3</div>
                <p>אם האבן האחרונה נחתה בקופה שלכם, אתם זוכים בתור נוסף באופן אוטומטי.</p>
            </div>
        </section>
        
        <button onclick="window.location.href='../index.html'" class="start-btn">הבנתי, בואו נשחק!</button>
    </main>
 <script>
    const instructionsMusic = new Audio('../sound/forGame.mp3');
    instructionsMusic.loop = true;
    instructionsMusic.volume = 1.0;

    // פונקציה להפעלה מיידית
    const startMusicQuickly = () => {
        instructionsMusic.play().catch(e => console.log("Waiting for interaction..."));
        
        // ברגע שהצלחנו לנגן, נסיר את כל המאזינים כדי לא להעמיס
        const events = ['click', 'mousedown', 'keydown', 'touchstart'];
        events.forEach(event => document.removeEventListener(event, startMusicQuickly));
    };

    // האזנה לכל סוג של אינטראקציה (עמידה בדרישת "אירועים נוספים")
    ['click', 'mousedown', 'keydown', 'touchstart'].forEach(event => {
        document.addEventListener(event, startMusicQuickly);
    });
</script>
</script>
</body>
</html>
