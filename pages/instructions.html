<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מנקלה - הוראות</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <header>
        <h1>איך משחקים?</h1>
    </header>
    <main class="instructions-container">
        <section class="instruction-step">
            <img src="../images/MANCALA01.png" class="instruction-img">
            <div class="step-content">
                <span class="step-number">1</span>
                <p>לוח המשחק בנוי מ-12 גומות ושתי קופות. בתחילת המשחק מניחים 4 אבנים בכל גומה.</p>
            </div>
        </section>

        <section class="instruction-step">
            <img src="../images/MANCALA02.png" class="instruction-img">
            <div class="step-content">
                <span class="step-number">2</span>
                <p>כל שחקן לוקח את כל האבנים מאחת הגומות בצד שלו ומפזר אותן נגד כיוון השעון.</p>
            </div>
        </section>

        <section class="instruction-step">
            <img src="../images/MANCALA03.png" class="instruction-img">
            <div class="step-content">
                <span class="step-number">3</span>
                <p>אם האבן האחרונה נוחתת בקופה שלך, אתה זוכה בתור נוסף.</p>
            </div>
        </section>

        <button onclick="window.location.href='../index.html'">חזרה לדף הבית</button>
    </main>
</body>
</html>
